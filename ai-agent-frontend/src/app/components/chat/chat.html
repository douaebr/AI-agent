<div class="chat-container">

  <div class="chat-header">
    <div class="header-left">
      <div class="bot-icon">✨</div>
      <div class="header-title">Assistant</div>
      <div class="status-dot"></div>
    </div>
    <div class="header-right">
      <button class="toggle-btn audio-btn" [class.active]="audioMode" (click)="toggleAudioMode()" [title]="audioMode ? 'Désactiver le mode vocal' : 'Activer le mode vocal'">
        {{ audioMode ? '🔊' : '🔇' }}
      </button>
      <button class="clear-btn" (click)="clearChat()" title="Effacer">✕</button>
    </div>
  </div>

  <div class="pdf-banner" *ngIf="uploadedFileName">
    <span>📎</span> {{ uploadedFileName }} chargé — posez vos questions !
  </div>

  <div class="messages-container" #messagesContainer>
    <div *ngFor="let msg of messages"
         class="message"
         [class.user-message]="msg.role === 'user'"
         [class.assistant-message]="msg.role === 'assistant'">
      <div class="message-avatar">{{ msg.role === 'user' ? '👤' : '✨' }}</div>
      <div class="message-content">
        <p>{{ msg.content }}</p>
        <span class="message-time">{{ msg.timestamp | date:'HH:mm' }}</span>
      </div>
    </div>

    <div *ngIf="isThinking" class="message assistant-message">
      <div class="message-avatar">✨</div>
      <div class="message-content typing">
        <span></span><span></span><span></span>
      </div>
    </div>
  </div>

  <div class="mode-indicator">
    {{ audioMode ? '🔊 Mode vocal activé' : '— Mode texte —' }}
    <span *ngIf="isRecording" class="recording-indicator"> • 🔴 Enregistrement</span>
  </div>

  <div class="input-area">
    <button class="upload-btn" (click)="triggerFileUpload()" [disabled]="isUploading" title="Joindre un PDF">
      {{ isUploading ? '⏳' : '📎' }}
    </button>

    <textarea
      #messageInput
      [(ngModel)]="userMessage"
      (keydown)="onEnterKey($event)"
      placeholder="Écrivez un message..."
      rows="1"
      [disabled]="isThinking">
    </textarea>

    <!-- Bouton stop audio (visible uniquement si audio en cours) -->
    <button *ngIf="isSpeaking" class="stop-audio-btn" (click)="stopSpeaking()" title="Arrêter la lecture">⏹️</button>

    <button class="mic-btn" [class.recording]="isRecording" (click)="toggleRecording()" title="Microphone">
      {{ isRecording ? '⏹️' : '🎤' }}
    </button>

    <button class="send-btn" (click)="sendMessage()" [disabled]="!userMessage.trim() || isThinking">➤</button>
  </div>

  <input type="file" #fileInput hidden accept=".pdf" (change)="onFileSelected($event)">

</div>
